<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LangChat — Tutor</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #030710;
      color: #F2FAFF;
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      padding: 24px;
    }

    h1 {
      font-size: 14px;
      font-weight: 300;
      color: #7FC8FF;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 1px solid #161F34;
      flex-wrap: wrap;
    }

    .tab {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 8px 16px;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      background: none;
      color: #40668D;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab.active {
      color: #7FC8FF;
      border-color: #2F4B68;
      background: #0D1322;
      margin-bottom: -1px;
    }

    .tab.disabled {
      color: #1E3048;
      cursor: not-allowed;
    }

    .tab.student-tab {
      color: #99D3FF;
    }

    .tab.student-tab.active {
      color: #7FC8FF;
      border-color: #2F4B68;
      background: #0D1322;
    }

    /* Tab content panels */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Main layout */
    .layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .diagram-wrap {
      flex: 0 0 680px;
      max-width: 100%;
    }

    svg { width: 100%; }
    .clickable { cursor: pointer; }
    .clickable:hover > rect { opacity: 0.75; transition: opacity 0.15s; }

    /* Chat panel */
    .chat-panel {
      flex: 1;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .response-panel {
      background: #0D1322;
      border: 1px solid #2F4B68;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .response-header {
      padding: 12px 16px;
      border-bottom: 1px solid #161F34;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .response-title { font-size: 11px; font-weight: 500; color: #7FC8FF; }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #2F4B68;
      transition: background 0.3s;
    }
    .status-dot.active { background: #006DDD; animation: pulse 1s ease-in-out infinite; }
    .status-dot.done { background: #7FC8FF; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .question-label {
      padding: 10px 16px 0;
      font-size: 10px;
      color: #40668D;
      min-height: 28px;
    }

    .response-body {
      padding: 12px 16px 16px;
      font-size: 12px;
      font-weight: 300;
      color: #F2FAFF;
      line-height: 1.7;
      min-height: 200px;
      white-space: pre-wrap;
      overflow-y: auto;
      max-height: 420px;
    }
    .response-body.placeholder { color: #2F4B68; }
    .error-msg { color: #FBB0A5; font-size: 11px; }

    .thread-info {
      padding: 8px 16px;
      font-size: 10px;
      color: #2F4B68;
      border-top: 1px solid #161F34;
    }

    /* Free-form input */
    .input-row { display: flex; gap: 8px; }

    .chat-input {
      flex: 1;
      background: #0D1322;
      border: 1px solid #2F4B68;
      border-radius: 8px;
      color: #F2FAFF;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      min-height: 44px;
      max-height: 120px;
    }
    .chat-input:focus { border-color: #7FC8FF; }
    .chat-input::placeholder { color: #2F4B68; }

    .send-btn {
      background: #006DDD;
      border: none;
      border-radius: 8px;
      color: #F2FAFF;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-end;
    }
    .send-btn:hover { background: #0085FF; }
    .send-btn:disabled { background: #161F34; color: #2F4B68; cursor: not-allowed; }

    /* Student panel */
    .student-panel {
      background: #0D1322;
      border: 1px solid #2F4B68;
      border-radius: 10px;
      padding: 24px;
      max-width: 600px;
    }

    .student-panel h2 {
      font-size: 12px;
      font-weight: 500;
      color: #7FC8FF;
      margin-bottom: 20px;
    }

    .student-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 16px;
    }

    .student-field label {
      font-size: 10px;
      color: #40668D;
    }

    .student-field input,
    .student-field textarea {
      background: #161F34;
      border: 1px solid #2F4B68;
      border-radius: 6px;
      color: #F2FAFF;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }

    .student-field input:focus,
    .student-field textarea:focus { border-color: #7FC8FF; }
    .student-field input::placeholder,
    .student-field textarea::placeholder { color: #2F4B68; }

    .student-field input[type="password"] { letter-spacing: 0.1em; }

    .name-row {
      display: flex;
      gap: 12px;
    }

    .name-row .student-field { flex: 1; }

    .action-btn {
      background: #006DDD;
      border: none;
      border-radius: 8px;
      color: #F2FAFF;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .action-btn:hover { background: #0085FF; }
    .action-btn:disabled { background: #161F34; color: #2F4B68; cursor: not-allowed; }
    .action-btn.secondary { background: #161F34; color: #40668D; }
    .action-btn.secondary:hover { background: #1E3048; color: #7FC8FF; }

    .status-msg {
      font-size: 10px;
      color: #40668D;
      margin-top: 12px;
      min-height: 16px;
    }
    .status-msg.error { color: #FBB0A5; }
    .status-msg.success { color: #7FC8FF; }

    .toggle-link {
      font-size: 10px;
      color: #40668D;
      margin-top: 16px;
    }
    .toggle-link span {
      color: #7FC8FF;
      cursor: pointer;
      text-decoration: underline;
    }

    /* Resources table */
    .resources-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
      margin-top: 12px;
    }
    .resources-table th {
      text-align: left;
      color: #40668D;
      padding: 6px 10px;
      border-bottom: 1px solid #161F34;
    }
    .resources-table td {
      color: #F2FAFF;
      padding: 6px 10px;
      border-bottom: 1px solid #0D1322;
      word-break: break-all;
    }
    .resources-table tr:hover td { background: #0D1322; }

    .resources-note {
      font-size: 10px;
      color: #40668D;
      margin-bottom: 16px;
      padding: 10px;
      border: 1px solid #161F34;
      border-radius: 6px;
    }
  </style>
</head>
<body>

<h1>langchat — tutor</h1>

<!-- Tabs -->
<div class="tabs" id="tabBar">
  <button class="tab student-tab active" data-tab="config" onclick="switchTab('config')">account</button>
  <button class="tab student-tab" data-tab="resources" onclick="switchTab('resources')">resources</button>
  <!-- lesson tabs injected by JS -->
</div>

<!-- Account tab -->
<div id="tab-config" class="tab-content active">
  <div class="student-panel">
    <h2 id="accountHeading">account</h2>

    <!-- Login form -->
    <div id="loginSection">
      <div class="student-field">
        <label class="username-label">username</label>
        <input type="text" id="loginUsername" placeholder="your username" autocomplete="username">
      </div>
      <div class="student-field">
        <label>password</label>
        <input type="password" id="loginPassword" placeholder="your password" autocomplete="current-password"
          onkeydown="if(event.key==='Enter') login()">
      </div>
      <button class="action-btn" onclick="login()">log in</button>
      <div class="status-msg" id="loginStatus"></div>
      <p class="toggle-link">no account? <span onclick="toggleRegister()">register</span></p>
    </div>

    <!-- Register form (hidden by default) -->
    <div id="registerSection" style="display:none">
      <div class="name-row">
        <div class="student-field">
          <label>first name</label>
          <input type="text" id="regFirstName" placeholder="Jane" autocomplete="given-name">
        </div>
        <div class="student-field">
          <label>last name</label>
          <input type="text" id="regLastName" placeholder="Doe" autocomplete="family-name">
        </div>
      </div>
      <div class="student-field">
        <label class="username-label">username</label>
        <input type="text" id="regUsername" placeholder="janedoe" autocomplete="username">
      </div>
      <div class="student-field">
        <label>password</label>
        <input type="password" id="regPassword" placeholder="choose a password" autocomplete="new-password">
      </div>
      <div class="student-field">
        <label>course goals</label>
        <textarea id="regGoals" rows="3" placeholder="what do you want to get out of this course?"></textarea>
      </div>
      <div class="student-field">
        <label>about you — interests, skill level, how you like to learn</label>
        <textarea id="regPreferences" rows="3" placeholder="e.g. Python dev, 2 years experience, new to LangGraph"></textarea>
      </div>
      <button class="action-btn" onclick="register()">register</button>
      <div class="status-msg" id="registerStatus"></div>
      <p class="toggle-link">already have an account? <span onclick="toggleRegister()">log in</span></p>
    </div>

    <!-- Profile section (shown when logged in) -->
    <div id="profileSection" style="display:none">
      <p style="font-size:11px; color:#40668D; margin-bottom:20px;">
        logged in as <span id="usernameDisplay" style="color:#7FC8FF"></span>
      </p>
      <div class="student-field">
        <label>course goals</label>
        <textarea id="goals" rows="3" placeholder="what do you want to get out of this course?"></textarea>
      </div>
      <div class="student-field">
        <label>about you — interests, skill level, how you like to learn</label>
        <textarea id="preferences" rows="4" placeholder="e.g. Python dev, 2 years experience, new to LangGraph"></textarea>
      </div>
      <button class="action-btn" onclick="studentUpdate()">update profile</button>
      <button class="action-btn secondary" onclick="logout()" style="margin-left:8px">log out</button>
      <div class="status-msg" id="studentStatus"></div>
    </div>
  </div>
</div>

<!-- Resources tab -->
<div id="tab-resources" class="tab-content">
  <div class="student-panel" style="max-width:900px">
    <h2>resources</h2>
    <div class="resources-note">
      step 1 — all resources shown. filtering by owner added in step 2 when @auth.on is enabled.
    </div>
    <div id="resourcesContent">
      <p style="font-size:11px; color:#40668D">log in to see your sessions.</p>
    </div>
  </div>
</div>

<!-- Lesson tab contents injected by JS -->

<script>
  // ---------------------------------------------------------------------------
  // State
  // ---------------------------------------------------------------------------

  const STORAGE_KEY = 'tutor:state';

  let state = {
    token: null,           // JWT string
    username: null,
    namespace: null,
    started: false,
    sessions: [],          // [{lesson_id, assistant_id, thread_id}, ...]
  };

  // Per-lesson streaming state
  const lessonState = {};   // lesson_id → {isStreaming}

  async function loadState() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        state = { ...state, ...JSON.parse(saved) };
        if (state.token) {
          const res = await fetch('/auth/validate', {
            headers: { 'Authorization': `Bearer ${state.token}` }
          }).catch(() => null);
          if (!res || res.status === 401) { logout(); return; }
          applyLoggedInState();
        }
      }
    } catch (e) { /* ignore */ }
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  // ---------------------------------------------------------------------------
  // Tab management
  // ---------------------------------------------------------------------------

  let activeTab = 'config';

  function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));

    const content = document.getElementById(`tab-${tabId}`);
    if (content) content.classList.add('active');

    document.querySelectorAll('.tab').forEach(el => {
      if (el.dataset.tab === tabId) el.classList.add('active');
    });

    activeTab = tabId;
    if (tabId === 'resources' && state.token) renderResources();
  }

  // ---------------------------------------------------------------------------
  // Lesson tabs — built from server lesson list
  // ---------------------------------------------------------------------------

  async function buildLessonTabs() {
    const res = await fetch('/lessons');
    const { lessons } = await res.json();

    const tabBar = document.getElementById('tabBar');
    const body = document.body;

    lessons.forEach(lesson => {
      const btn = document.createElement('button');
      btn.className = lesson.active ? 'tab' : 'tab disabled';
      btn.dataset.tab = lesson.id;
      btn.title = lesson.active ? '' : 'coming soon';
      btn.textContent = lesson.active
        ? `lesson ${lesson.id.replace('tutor_l', '')} — ${lesson.label}`
        : `lesson ${lesson.id.replace('tutor_l', '')}`;
      if (lesson.active) btn.onclick = () => switchTab(lesson.id);
      tabBar.appendChild(btn);

      const content = document.createElement('div');
      content.id = `tab-${lesson.id}`;
      content.className = 'tab-content';
      content.innerHTML = buildLessonContent(lesson);
      body.appendChild(content);

      lessonState[lesson.id] = { isStreaming: false };
    });
  }

  function buildLessonContent(lesson) {
    const session = state.sessions.find(s => s.lesson_id === lesson.id) || {};
    const threadId = session.thread_id || 'no thread';

    if (lesson.id === 'tutor_l1') {
      return `
        <div class="layout">
          <div class="diagram-wrap">${diagramSVG()}</div>
          <div class="chat-panel">${chatPanelHTML(lesson.id, threadId)}</div>
        </div>`;
    }
    return `<div class="chat-panel" style="max-width:600px">${chatPanelHTML(lesson.id, threadId)}</div>`;
  }

  function chatPanelHTML(lessonId, threadId) {
    return `
      <div class="response-panel">
        <div class="response-header">
          <span class="response-title">agent response</span>
          <span class="status-dot" id="dot-${lessonId}"></span>
        </div>
        <div class="question-label" id="label-${lessonId}">click any box or type below to ask the tutor</div>
        <div class="response-body placeholder" id="body-${lessonId}">responses will appear here...</div>
        <div class="thread-info" id="thread-${lessonId}">thread: ${threadId}</div>
      </div>
      <div class="input-row">
        <textarea class="chat-input" id="input-${lessonId}" placeholder="ask the tutor anything..." rows="1"
          onkeydown="handleKey(event, '${lessonId}')"></textarea>
        <button class="send-btn" id="send-${lessonId}" onclick="sendMessage('${lessonId}')">send</button>
      </div>`;
  }

  // ---------------------------------------------------------------------------
  // Account — login / register / logout
  // ---------------------------------------------------------------------------

  let showingRegister = false;

  function toggleRegister() {
    showingRegister = !showingRegister;
    document.getElementById('loginSection').style.display = showingRegister ? 'none' : 'block';
    document.getElementById('registerSection').style.display = showingRegister ? 'block' : 'none';
  }

  async function login() {
    const username = document.getElementById('loginUsername').value.trim();
    const password = document.getElementById('loginPassword').value;
    const statusEl = document.getElementById('loginStatus');

    if (!username || !password) {
      statusEl.textContent = 'enter username and password';
      statusEl.className = 'status-msg error';
      return;
    }

    statusEl.textContent = 'logging in...';
    statusEl.className = 'status-msg';

    try {
      const res = await fetch('/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail === 'invalid_credentials' ? 'invalid username or password' : err.detail);
      }

      const data = await res.json();
      state.token = data.token;
      state.username = data.namespace;
      state.namespace = data.namespace;
      state.sessions = data.sessions;
      state.started = true;

      if (data.profile) {
        document.getElementById('goals').value = data.profile.goals || '';
        document.getElementById('preferences').value = data.profile.preferences || '';
      }

      saveState();
      applyLoggedInState();

      document.querySelectorAll('.tab:not(.student-tab), .tab-content:not(#tab-config):not(#tab-resources)').forEach(el => el.remove());
      await buildLessonTabs();

    } catch (err) {
      statusEl.textContent = err.message;
      statusEl.className = 'status-msg error';
    }
  }

  async function register() {
    const firstName = document.getElementById('regFirstName').value.trim();
    const lastName = document.getElementById('regLastName').value.trim();
    const username = document.getElementById('regUsername').value.trim();
    const password = document.getElementById('regPassword').value;
    const goals = document.getElementById('regGoals').value.trim();
    const preferences = document.getElementById('regPreferences').value.trim();
    const statusEl = document.getElementById('registerStatus');

    if (!firstName || !lastName || !username || !password) {
      statusEl.textContent = 'first name, last name, username, and password are required';
      statusEl.className = 'status-msg error';
      return;
    }

    statusEl.textContent = 'registering...';
    statusEl.className = 'status-msg';

    try {
      const res = await fetch('/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password, first_name: firstName, last_name: lastName, goals, preferences }),
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail === 'username_taken' ? 'username already taken' : err.detail);
      }

      statusEl.textContent = 'registered! you can now log in.';
      statusEl.className = 'status-msg success';

      // Switch to login form and pre-fill username
      setTimeout(() => {
        toggleRegister();
        document.getElementById('loginUsername').value = username;
        document.getElementById('loginPassword').focus();
      }, 800);

    } catch (err) {
      statusEl.textContent = err.message;
      statusEl.className = 'status-msg error';
    }
  }

  async function logout() {
    await fetch('/auth/logout', { method: 'POST' }).catch(() => {});
    state = { token: null, username: null, namespace: null, started: false, sessions: [] };
    saveState();

    document.getElementById('loginUsername').value = '';
    document.getElementById('loginPassword').value = '';
    document.getElementById('loginStatus').textContent = '';

    document.getElementById('profileSection').style.display = 'none';
    document.getElementById('loginSection').style.display = 'block';
    if (showingRegister) toggleRegister();

    document.getElementById('resourcesContent').innerHTML =
      '<p style="font-size:11px; color:#40668D">log in to see your sessions.</p>';

    document.querySelectorAll('.tab:not(.student-tab), .tab-content:not(#tab-config):not(#tab-resources)').forEach(el => el.remove());

    switchTab('config');
  }

  function applyLoggedInState() {
    document.getElementById('loginSection').style.display = 'none';
    document.getElementById('registerSection').style.display = 'none';
    document.getElementById('profileSection').style.display = 'block';
    document.getElementById('usernameDisplay').textContent = state.username;
    renderResources();
  }

  // ---------------------------------------------------------------------------
  // Student profile update
  // ---------------------------------------------------------------------------

  async function studentUpdate() {
    const goals = document.getElementById('goals').value.trim();
    const preferences = document.getElementById('preferences').value.trim();
    const statusEl = document.getElementById('studentStatus');

    statusEl.textContent = 'updating...';
    statusEl.className = 'status-msg';

    try {
      const res = await fetch('/student/update', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${state.token}`,
        },
        body: JSON.stringify({ goals, preferences }),
      });

      if (res.status === 401) { logout(); return; }
      if (!res.ok) throw new Error(await res.text());
      statusEl.textContent = 'profile updated';
      statusEl.className = 'status-msg success';
    } catch (err) {
      statusEl.textContent = err.message;
      statusEl.className = 'status-msg error';
    }
  }

  // ---------------------------------------------------------------------------
  // Resources tab
  // ---------------------------------------------------------------------------

  async function renderResources() {
    const el = document.getElementById('resourcesContent');
    el.innerHTML = '<p style="font-size:11px; color:#40668D">loading...</p>';

    const authHeader = { 'Authorization': `Bearer ${state.token}` };

    try {
      const [resRes, storeRes] = await Promise.all([
        fetch('/resources', { headers: authHeader }),
        fetch('/store', { headers: authHeader }),
      ]);

      if (resRes.status === 401 || storeRes.status === 401) { logout(); return; }
      if (!resRes.ok) throw new Error(await resRes.text());
      if (!storeRes.ok) throw new Error(await storeRes.text());

      const { assistants, threads } = await resRes.json();
      const { items } = await storeRes.json();

      const assistantRows = assistants.map(a => `
        <tr>
          <td>${a.name || '—'}</td>
          <td>${a.assistant_id}</td>
          <td>${a.graph_id}</td>
        </tr>`).join('');

      const threadRows = threads.map(t => `
        <tr>
          <td>${t.thread_id}</td>
          <td>${t.status || '—'}</td>
          <td>${t.created_at ? new Date(t.created_at).toLocaleString() : '—'}</td>
        </tr>`).join('');

      const storeRows = items.map(item => `
        <tr>
          <td>${item.namespace.join(' / ')}</td>
          <td>${item.key}</td>
          <td>${item.updated_at ? new Date(item.updated_at).toLocaleString() : '—'}</td>
          <td><pre style="margin:0;white-space:pre-wrap;word-break:break-all">${JSON.stringify(item.value, null, 2)}</pre></td>
        </tr>`).join('');

      el.innerHTML = `
        <p style="font-size:11px; color:#7FC8FF; margin-bottom:16px">assistants (${assistants.length})</p>
        <table class="resources-table" style="margin-bottom:24px">
          <thead><tr><th>name</th><th>assistant id</th><th>graph</th></tr></thead>
          <tbody>${assistantRows || '<tr><td colspan="3" style="color:#40668D">none</td></tr>'}</tbody>
        </table>
        <p style="font-size:11px; color:#7FC8FF; margin-bottom:16px">threads (${threads.length})</p>
        <table class="resources-table" style="margin-bottom:24px">
          <thead><tr><th>thread id</th><th>status</th><th>created</th></tr></thead>
          <tbody>${threadRows || '<tr><td colspan="3" style="color:#40668D">none</td></tr>'}</tbody>
        </table>

  // ---------------------------------------------------------------------------
  // Chat
  // ---------------------------------------------------------------------------

  function ask(question) {
    if (activeTab && activeTab !== 'config' && activeTab !== 'resources') {
      document.getElementById(`input-${activeTab}`).value = question;
      sendMessage(activeTab);
    }
  }

  function handleKey(event, lessonId) {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      sendMessage(lessonId);
    }
  }

  async function sendMessage(lessonId) {
    if (lessonState[lessonId]?.isStreaming) return;
    if (!state.started) {
      alert('please log in first');
      switchTab('config');
      return;
    }

    const input = document.getElementById(`input-${lessonId}`);
    const message = input.value.trim();
    if (!message) return;

    const session = state.sessions.find(s => s.lesson_id === lessonId);
    if (!session) return;

    input.value = '';
    lessonState[lessonId].isStreaming = true;

    const dot = document.getElementById(`dot-${lessonId}`);
    const body = document.getElementById(`body-${lessonId}`);
    const label = document.getElementById(`label-${lessonId}`);
    const sendBtn = document.getElementById(`send-${lessonId}`);

    label.textContent = message;
    body.textContent = '';
    body.classList.remove('placeholder');
    dot.className = 'status-dot active';
    sendBtn.disabled = true;

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${state.token}`,
        },
        body: JSON.stringify({
          message,
          assistant_id: session.assistant_id,
          thread_id: session.thread_id,
        }),
      });

      if (res.status === 401) { logout(); return; }
      if (!res.ok) throw new Error(`${res.status} ${res.statusText}: ${await res.text()}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        body.textContent += decoder.decode(value, { stream: true });
        body.scrollTop = body.scrollHeight;
      }

      dot.className = 'status-dot done';

    } catch (err) {
      body.innerHTML = `<span class="error-msg">${err.message}</span>`;
      dot.className = 'status-dot';
    } finally {
      lessonState[lessonId].isStreaming = false;
      sendBtn.disabled = false;
    }
  }
