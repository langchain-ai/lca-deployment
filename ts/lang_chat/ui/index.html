<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LangChat — Tutor</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #030710;
      color: #F2FAFF;
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      padding: 24px;
    }

    h1 {
      font-size: 14px;
      font-weight: 300;
      color: #7FC8FF;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    /* Config bar */
    .config {
      background: #0D1322;
      border: 1px solid #2F4B68;
      border-radius: 10px;
      padding: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: flex-end;
    }

    .config-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      min-width: 200px;
    }

    .config-field label {
      font-size: 10px;
      color: #40668D;
    }

    .config-field input {
      background: #161F34;
      border: 1px solid #2F4B68;
      border-radius: 6px;
      color: #F2FAFF;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    .config-field input:focus { border-color: #7FC8FF; }
    .config-field input::placeholder { color: #2F4B68; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 1px solid #161F34;
      flex-wrap: wrap;
    }

    .tab {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 8px 16px;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      background: none;
      color: #40668D;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab.active {
      color: #7FC8FF;
      border-color: #2F4B68;
      background: #0D1322;
      margin-bottom: -1px;
    }

    .tab.disabled {
      color: #1E3048;
      cursor: not-allowed;
    }

    .tab.student-tab {
      color: #99D3FF;
    }

    .tab.student-tab.active {
      color: #7FC8FF;
      border-color: #2F4B68;
      background: #0D1322;
    }

    /* Tab content panels */
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* Main layout */
    .layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .diagram-wrap {
      flex: 0 0 680px;
      max-width: 100%;
    }

    svg { width: 100%; }
    .clickable { cursor: pointer; }
    .clickable:hover > rect { opacity: 0.75; transition: opacity 0.15s; }

    /* Chat panel */
    .chat-panel {
      flex: 1;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .response-panel {
      background: #0D1322;
      border: 1px solid #2F4B68;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .response-header {
      padding: 12px 16px;
      border-bottom: 1px solid #161F34;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .response-title { font-size: 11px; font-weight: 500; color: #7FC8FF; }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #2F4B68;
      transition: background 0.3s;
    }
    .status-dot.active { background: #006DDD; animation: pulse 1s ease-in-out infinite; }
    .status-dot.done { background: #7FC8FF; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .question-label {
      padding: 10px 16px 0;
      font-size: 10px;
      color: #40668D;
      min-height: 28px;
    }

    .response-body {
      padding: 12px 16px 16px;
      font-size: 12px;
      font-weight: 300;
      color: #F2FAFF;
      line-height: 1.7;
      min-height: 200px;
      white-space: pre-wrap;
      overflow-y: auto;
      max-height: 420px;
    }
    .response-body.placeholder { color: #2F4B68; }
    .error-msg { color: #FBB0A5; font-size: 11px; }

    .thread-info {
      padding: 8px 16px;
      font-size: 10px;
      color: #2F4B68;
      border-top: 1px solid #161F34;
    }

    /* Free-form input */
    .input-row { display: flex; gap: 8px; }

    .chat-input {
      flex: 1;
      background: #0D1322;
      border: 1px solid #2F4B68;
      border-radius: 8px;
      color: #F2FAFF;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      min-height: 44px;
      max-height: 120px;
    }
    .chat-input:focus { border-color: #7FC8FF; }
    .chat-input::placeholder { color: #2F4B68; }

    .send-btn {
      background: #006DDD;
      border: none;
      border-radius: 8px;
      color: #F2FAFF;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-end;
    }
    .send-btn:hover { background: #0085FF; }
    .send-btn:disabled { background: #161F34; color: #2F4B68; cursor: not-allowed; }

    /* Student panel */
    .student-panel {
      background: #0D1322;
      border: 1px solid #2F4B68;
      border-radius: 10px;
      padding: 24px;
      max-width: 600px;
    }

    .student-panel h2 {
      font-size: 12px;
      font-weight: 500;
      color: #7FC8FF;
      margin-bottom: 20px;
    }

    .student-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 16px;
    }

    .student-field label {
      font-size: 10px;
      color: #40668D;
    }

    .student-field input,
    .student-field textarea {
      background: #161F34;
      border: 1px solid #2F4B68;
      border-radius: 6px;
      color: #F2FAFF;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.2s;
      resize: vertical;
    }

    .student-field input:focus,
    .student-field textarea:focus { border-color: #7FC8FF; }
    .student-field input::placeholder,
    .student-field textarea::placeholder { color: #2F4B68; }

    .student-field input:disabled {
      color: #40668D;
      cursor: not-allowed;
    }

    .name-row {
      display: flex;
      gap: 12px;
    }

    .name-row .student-field { flex: 1; }

    .action-btn {
      background: #006DDD;
      border: none;
      border-radius: 8px;
      color: #F2FAFF;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 10px 20px;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 8px;
    }
    .action-btn:hover { background: #0085FF; }
    .action-btn:disabled { background: #161F34; color: #2F4B68; cursor: not-allowed; }

    .status-msg {
      font-size: 10px;
      color: #40668D;
      margin-top: 12px;
      min-height: 16px;
    }
    .status-msg.error { color: #FBB0A5; }
    .status-msg.success { color: #7FC8FF; }
  </style>
</head>
<body>

<h1>langchat — tutor</h1>

<!-- Tabs -->
<div class="tabs" id="tabBar">
  <button class="tab student-tab active" data-tab="config" onclick="switchTab('config')">config</button>
  <!-- lesson tabs injected by JS -->
</div>

<!-- Config tab -->
<div id="tab-config" class="tab-content active">
  <div class="student-panel">
    <h2>configuration</h2>
    <h2>student profile</h2>
    <div class="name-row">
      <div class="student-field">
        <label>first name</label>
        <input type="text" id="firstName" placeholder="Jane" value="Jane">
      </div>
      <div class="student-field">
        <label>last name</label>
        <input type="text" id="lastName" placeholder="Doe" value="Doe">
      </div>
    </div>
    <div class="student-field">
      <label>course goals</label>
      <textarea id="goals" rows="3" placeholder="what do you want to get out of this course?"></textarea>
    </div>
    <div class="student-field">
      <label>about you — interests, skill level, how you like to learn</label>
      <textarea id="preferences" rows="4" placeholder="e.g. I'm a Python developer with 2 years experience, new to LangGraph. I like hands-on examples and concise explanations."></textarea>
    </div>
    <button class="action-btn" id="startBtn" onclick="studentStart()">start</button>
    <button class="action-btn" id="updateBtn" onclick="studentUpdate()" style="display:none">update</button>
    <div class="status-msg" id="studentStatus"></div>
  </div>
</div>

<!-- Lesson tab contents injected by JS -->

<script>
  // ---------------------------------------------------------------------------
  // State
  // ---------------------------------------------------------------------------

  const STORAGE_KEY = 'tutor:state';

  let state = {
    namespace: null,        // e.g. "jane_doe"
    started: false,
    sessions: [],           // [{lesson_id, assistant_id, thread_id}, ...]
  };

  // Per-lesson streaming state
  const lessonState = {};   // lesson_id → {isStreaming}

  // Load saved state from localStorage
  function loadState() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        state = JSON.parse(saved);
        if (state.started) applyStartedState();
      }
    } catch (e) { /* ignore */ }
  }

  function saveState() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  }

  // ---------------------------------------------------------------------------
  // Tab management
  // ---------------------------------------------------------------------------

  let activeTab = 'config'; // default tab

  function switchTab(tabId) {
    document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));

    const content = document.getElementById(`tab-${tabId}`);
    if (content) content.classList.add('active');

    document.querySelectorAll('.tab').forEach(el => {
      if (el.dataset.tab === tabId) el.classList.add('active');
    });

    activeTab = tabId;
  }

  // ---------------------------------------------------------------------------
  // Lesson tabs — built from server lesson list
  // ---------------------------------------------------------------------------

  async function buildLessonTabs() {
    const res = await fetch('/lessons');
    const { lessons } = await res.json();

    const tabBar = document.getElementById('tabBar');
    const body = document.body;

    lessons.forEach(lesson => {
      // Tab button
      const btn = document.createElement('button');
      btn.className = lesson.active ? 'tab' : 'tab disabled';
      btn.dataset.tab = lesson.id;
      btn.title = lesson.active ? '' : 'coming soon';
      btn.textContent = lesson.active
        ? `lesson ${lesson.id.replace('tutor_l', '')} — ${lesson.label}`
        : `lesson ${lesson.id.replace('tutor_l', '')}`;
      if (lesson.active) btn.onclick = () => switchTab(lesson.id);
      tabBar.appendChild(btn);

      // Tab content
      const content = document.createElement('div');
      content.id = `tab-${lesson.id}`;
      content.className = 'tab-content';
      content.innerHTML = buildLessonContent(lesson);
      body.appendChild(content);

      lessonState[lesson.id] = { isStreaming: false };
    });
  }

  function buildLessonContent(lesson) {
    const session = state.sessions.find(s => s.lesson_id === lesson.id) || {};
    const threadId = session.thread_id || 'no thread';

    if (lesson.id === 'tutor_l1') {
      return `
        <div class="layout">
          <div class="diagram-wrap">${diagramSVG()}</div>
          <div class="chat-panel">${chatPanelHTML(lesson.id, threadId)}</div>
        </div>`;
    }
    return `<div class="chat-panel" style="max-width:600px">${chatPanelHTML(lesson.id, threadId)}</div>`;
  }

  function chatPanelHTML(lessonId, threadId) {
    return `
      <div class="response-panel">
        <div class="response-header">
          <span class="response-title">agent response</span>
          <span class="status-dot" id="dot-${lessonId}"></span>
        </div>
        <div class="question-label" id="label-${lessonId}">click any box or type below to ask the tutor</div>
        <div class="response-body placeholder" id="body-${lessonId}">responses will appear here...</div>
        <div class="thread-info" id="thread-${lessonId}">thread: ${threadId}</div>
      </div>
      <div class="input-row">
        <textarea class="chat-input" id="input-${lessonId}" placeholder="ask the tutor anything..." rows="1"
          onkeydown="handleKey(event, '${lessonId}')"></textarea>
        <button class="send-btn" id="send-${lessonId}" onclick="sendMessage('${lessonId}')">send</button>
      </div>`;
  }

  // ---------------------------------------------------------------------------
  // Student start / update
  // ---------------------------------------------------------------------------

  async function studentStart() {
    const firstName = document.getElementById('firstName').value.trim() || 'Jane';
    const lastName = document.getElementById('lastName').value.trim() || 'Doe';
    const goals = document.getElementById('goals').value.trim();
    const preferences = document.getElementById('preferences').value.trim();
    const statusEl = document.getElementById('studentStatus');

    document.getElementById('startBtn').disabled = true;
    statusEl.textContent = 'creating sessions...';
    statusEl.className = 'status-msg';

    try {
      const res = await fetch('/student/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ first_name: firstName, last_name: lastName, goals, preferences }),
      });

      if (!res.ok) throw new Error(await res.text());
      const data = await res.json();

      state.namespace = data.namespace;
      state.sessions = data.sessions;
      state.started = true;
      saveState();

      applyStartedState();
      // Rebuild lesson tabs to inject correct thread IDs
      document.querySelectorAll('.tab:not(.student-tab), .tab-content:not(#tab-config)').forEach(el => el.remove());
      await buildLessonTabs();

      statusEl.textContent = `started as ${firstName} ${lastName}`;
      statusEl.className = 'status-msg success';

    } catch (err) {
      statusEl.textContent = err.message;
      statusEl.className = 'status-msg error';
      document.getElementById('startBtn').disabled = false;
    }
  }

  async function studentUpdate() {
    const goals = document.getElementById('goals').value.trim();
    const preferences = document.getElementById('preferences').value.trim();
    const statusEl = document.getElementById('studentStatus');

    statusEl.textContent = 'updating...';
    statusEl.className = 'status-msg';

    try {
      const res = await fetch('/student/update', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ namespace: state.namespace, goals, preferences }),
      });

      if (!res.ok) throw new Error(await res.text());
      statusEl.textContent = 'profile updated';
      statusEl.className = 'status-msg success';
    } catch (err) {
      statusEl.textContent = err.message;
      statusEl.className = 'status-msg error';
    }
  }

  function applyStartedState() {
    document.getElementById('updateBtn').style.display = 'inline-block';
  }

  // ---------------------------------------------------------------------------
  // Chat
  // ---------------------------------------------------------------------------

  function ask(question) {
    if (activeTab && activeTab !== 'config') {
      document.getElementById(`input-${activeTab}`).value = question;
      sendMessage(activeTab);
    }
  }

  function handleKey(event, lessonId) {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      sendMessage(lessonId);
    }
  }

  async function sendMessage(lessonId) {
    if (lessonState[lessonId]?.isStreaming) return;
    if (!state.started) {
      alert('please complete your student profile first');
      switchTab('config');
      return;
    }

    const input = document.getElementById(`input-${lessonId}`);
    const message = input.value.trim();
    if (!message) return;

    const session = state.sessions.find(s => s.lesson_id === lessonId);
    if (!session) return;

    input.value = '';
    lessonState[lessonId].isStreaming = true;

    const dot = document.getElementById(`dot-${lessonId}`);
    const body = document.getElementById(`body-${lessonId}`);
    const label = document.getElementById(`label-${lessonId}`);
    const sendBtn = document.getElementById(`send-${lessonId}`);

    label.textContent = message;
    body.textContent = '';
    body.classList.remove('placeholder');
    dot.className = 'status-dot active';
    sendBtn.disabled = true;

    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message,
          assistant_id: session.assistant_id,
          thread_id: session.thread_id,
        }),
      });

      if (!res.ok) throw new Error(`${res.status} ${res.statusText}: ${await res.text()}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        body.textContent += decoder.decode(value, { stream: true });
        body.scrollTop = body.scrollHeight;
      }

      dot.className = 'status-dot done';

    } catch (err) {
      body.innerHTML = `<span class="error-msg">${err.message}</span>`;
      dot.className = 'status-dot';
    } finally {
      lessonState[lessonId].isStreaming = false;
      sendBtn.disabled = false;
    }
  }

  // ---------------------------------------------------------------------------
  // SVG diagram (lesson 1 only)
  // ---------------------------------------------------------------------------

  function diagramSVG() {
    return `<svg viewBox="0 0 680 415" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>
      <rect width="680" height="415" fill="#030710" rx="12"/>
      <g class="clickable" onclick="ask('What is the Agent Server in LangGraph Deployment? What does it include and how does it work?')">
        <rect x="5" y="5" width="390" height="404" rx="16" fill="none" stroke="#2F4B68" stroke-width="1.2" stroke-dasharray="7 3"/>
        <text x="200" y="22" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#7FC8FF">agent server</text>
        <text x="200" y="37" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="300" fill="#40668D">deployment instance</text>
      </g>
      <g class="clickable" onclick="ask('What is the container layer in LangGraph Deployment? What does always-on compute mean and how does it differ from serverless?')">
        <rect x="18" y="46" width="364" height="356" rx="14" fill="#0D1322" stroke="#7FC8FF" stroke-width="0.6"/>
        <text x="200" y="64" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#F2FAFF">container</text>
        <text x="200" y="79" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="300" fill="#7FC8FF">always-on compute</text>
      </g>
      <g class="clickable" onclick="ask('What does the worker process do in LangGraph Deployment? How does it pick up runs from the queue?')">
        <rect x="32" y="88" width="336" height="306" rx="12" fill="#161F34" stroke="#40668D" stroke-width="0.6"/>
        <text x="200" y="106" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#F2FAFF">worker process</text>
        <text x="200" y="121" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="300" fill="#99D3FF">picks up runs from queue</text>
      </g>
      <g class="clickable" onclick="ask('What does the LangGraph runtime do? What is its role in graph execution?')">
        <rect x="46" y="128" width="308" height="258" rx="10" fill="#030710" stroke="#006DDD" stroke-width="0.6"/>
        <text x="200" y="146" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#F2FAFF">langgraph runtime</text>
        <text x="200" y="161" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="300" fill="#7FC8FF">graph execution engine</text>
      </g>
      <g class="clickable" onclick="ask('What is the agent graph in LangGraph? What are nodes, edges, and state?')">
        <rect x="60" y="170" width="280" height="207" rx="8" fill="#0D1322" stroke="#2F4B68" stroke-width="0.6"/>
        <text x="200" y="188" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#F2FAFF">agent graph</text>
        <text x="200" y="203" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="300" fill="#99D3FF">your business logic</text>
      </g>
      <g class="clickable" onclick="ask('How does a LangGraph agent call an LLM? What happens inside a call_llm node?')">
        <rect x="72" y="218" width="76" height="30" rx="5" fill="#161F34" stroke="#40668D" stroke-width="0.6"/>
        <text x="110" y="233" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="400" fill="#F2FAFF">call llm</text>
      </g>
      <g class="clickable" onclick="ask('How does a LangGraph agent call a tool? What is a tool node and how does tool calling work?')">
        <rect x="161" y="218" width="76" height="30" rx="5" fill="#161F34" stroke="#40668D" stroke-width="0.6"/>
        <text x="199" y="233" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="400" fill="#F2FAFF">call tool</text>
      </g>
      <g class="clickable" onclick="ask('How does state get updated in a LangGraph agent? What are reducers and how does state flow through the graph?')">
        <rect x="250" y="218" width="82" height="30" rx="5" fill="#161F34" stroke="#40668D" stroke-width="0.6"/>
        <text x="291" y="233" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="400" fill="#F2FAFF">update state</text>
      </g>
      <line x1="148" y1="233" x2="161" y2="233" stroke="#40668D" stroke-width="1.2" marker-end="url(#arr)"/>
      <line x1="237" y1="233" x2="250" y2="233" stroke="#40668D" stroke-width="1.2" marker-end="url(#arr)"/>
      <text x="200" y="267" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="300" fill="#40668D">edge routing · reducers · state</text>
      <text x="200" y="284" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="300" fill="#2F4B68">compiled once · reused per run</text>
