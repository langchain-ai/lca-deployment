<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LangChat — Tutor</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #030710;
      color: #F2FAFF;
      font-family: 'IBM Plex Mono', monospace;
      min-height: 100vh;
      padding: 24px;
    }

    h1 {
      font-size: 14px;
      font-weight: 300;
      color: #7FC8FF;
      letter-spacing: -0.02em;
      margin-bottom: 16px;
    }

    /* Config bar */
    .config {
      background: #0D1322;
      border: 1px solid #2F4B68;
      border-radius: 10px;
      padding: 16px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
      align-items: flex-end;
    }

    .config-field {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      min-width: 200px;
    }

    .config-field label {
      font-size: 10px;
      color: #40668D;
    }

    .config-field input {
      background: #161F34;
      border: 1px solid #2F4B68;
      border-radius: 6px;
      color: #F2FAFF;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 8px 10px;
      outline: none;
      transition: border-color 0.2s;
    }

    .config-field input:focus { border-color: #7FC8FF; }
    .config-field input::placeholder { color: #2F4B68; }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 20px;
      border-bottom: 1px solid #161F34;
    }

    .tab {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 8px 16px;
      border: 1px solid transparent;
      border-bottom: none;
      border-radius: 6px 6px 0 0;
      cursor: pointer;
      background: none;
      color: #40668D;
      transition: color 0.2s, border-color 0.2s;
    }

    .tab.active {
      color: #7FC8FF;
      border-color: #2F4B68;
      background: #0D1322;
      margin-bottom: -1px;
    }

    .tab.disabled {
      color: #1E3048;
      cursor: not-allowed;
    }

    /* Main layout */
    .layout {
      display: flex;
      gap: 20px;
      align-items: flex-start;
      flex-wrap: wrap;
    }

    .diagram-wrap {
      flex: 0 0 680px;
      max-width: 100%;
    }

    svg { width: 100%; }
    .clickable { cursor: pointer; }
    .clickable:hover > rect { opacity: 0.75; transition: opacity 0.15s; }

    /* Chat panel */
    .chat-panel {
      flex: 1;
      min-width: 280px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .response-panel {
      background: #0D1322;
      border: 1px solid #2F4B68;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .response-header {
      padding: 12px 16px;
      border-bottom: 1px solid #161F34;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .response-title { font-size: 11px; font-weight: 500; color: #7FC8FF; }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #2F4B68;
      transition: background 0.3s;
    }
    .status-dot.active { background: #006DDD; animation: pulse 1s ease-in-out infinite; }
    .status-dot.done { background: #7FC8FF; }

    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

    .question-label {
      padding: 10px 16px 0;
      font-size: 10px;
      color: #40668D;
      min-height: 28px;
    }

    .response-body {
      padding: 12px 16px 16px;
      font-size: 12px;
      font-weight: 300;
      color: #F2FAFF;
      line-height: 1.7;
      min-height: 200px;
      white-space: pre-wrap;
      overflow-y: auto;
      max-height: 420px;
    }
    .response-body.placeholder { color: #2F4B68; }
    .error-msg { color: #FBB0A5; font-size: 11px; }

    .thread-info {
      padding: 8px 16px;
      font-size: 10px;
      color: #2F4B68;
      border-top: 1px solid #161F34;
    }

    .new-thread-btn {
      background: none;
      border: 1px solid #2F4B68;
      border-radius: 5px;
      color: #40668D;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      padding: 4px 10px;
      cursor: pointer;
      margin-left: 8px;
      transition: border-color 0.2s, color 0.2s;
    }
    .new-thread-btn:hover { border-color: #7FC8FF; color: #7FC8FF; }

    /* Free-form input */
    .input-row { display: flex; gap: 8px; }

    .chat-input {
      flex: 1;
      background: #0D1322;
      border: 1px solid #2F4B68;
      border-radius: 8px;
      color: #F2FAFF;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
      resize: none;
      min-height: 44px;
      max-height: 120px;
    }
    .chat-input:focus { border-color: #7FC8FF; }
    .chat-input::placeholder { color: #2F4B68; }

    .send-btn {
      background: #006DDD;
      border: none;
      border-radius: 8px;
      color: #F2FAFF;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 10px 16px;
      cursor: pointer;
      transition: background 0.2s;
      align-self: flex-end;
    }
    .send-btn:hover { background: #0085FF; }
    .send-btn:disabled { background: #161F34; color: #2F4B68; cursor: not-allowed; }
  </style>
</head>
<body>

<h1>langchat — tutor</h1>

<!-- Connection config -->
<div class="config">
  <div class="config-field">
    <label>deployment url</label>
    <input type="text" id="deploymentUrl" placeholder="https://your-deployment.smith.langchain.com (or http://127.0.0.1:2024 for local)" value="http://127.0.0.1:2024">
  </div>
  <div class="config-field" style="max-width:180px">
    <label>assistant id</label>
    <input type="text" id="assistantId" placeholder="tutor" value="tutor">
  </div>
</div>

<!-- Lesson tabs -->
<div class="tabs">
  <button class="tab active">lesson 1 — deployment architecture</button>
  <button class="tab disabled" title="coming soon">lesson 2</button>
  <button class="tab disabled" title="coming soon">lesson 3</button>
</div>

<div class="layout">
  <!-- Diagram -->
  <div class="diagram-wrap">
    <svg viewBox="0 0 680 415" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto-start-reverse">
          <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <rect width="680" height="415" fill="#030710" rx="12"/>

      <g class="clickable" onclick="ask('What is the Agent Server in LangGraph Deployment? What does it include and how does it work?')">
        <rect x="5" y="5" width="390" height="404" rx="16" fill="none" stroke="#2F4B68" stroke-width="1.2" stroke-dasharray="7 3"/>
        <text x="200" y="22" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#7FC8FF">agent server</text>
        <text x="200" y="37" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="300" fill="#40668D">deployment instance</text>
      </g>

      <g class="clickable" onclick="ask('What is the container layer in LangGraph Deployment? What does always-on compute mean and how does it differ from serverless?')">
        <rect x="18" y="46" width="364" height="356" rx="14" fill="#0D1322" stroke="#7FC8FF" stroke-width="0.6"/>
        <text x="200" y="64" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#F2FAFF">container</text>
        <text x="200" y="79" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="300" fill="#7FC8FF">always-on compute</text>
      </g>

      <g class="clickable" onclick="ask('What does the worker process do in LangGraph Deployment? How does it pick up runs from the queue?')">
        <rect x="32" y="88" width="336" height="306" rx="12" fill="#161F34" stroke="#40668D" stroke-width="0.6"/>
        <text x="200" y="106" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#F2FAFF">worker process</text>
        <text x="200" y="121" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="300" fill="#99D3FF">picks up runs from queue</text>
      </g>

      <g class="clickable" onclick="ask('What does the LangGraph runtime do? What is its role in graph execution?')">
        <rect x="46" y="128" width="308" height="258" rx="10" fill="#030710" stroke="#006DDD" stroke-width="0.6"/>
        <text x="200" y="146" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#F2FAFF">langgraph runtime</text>
        <text x="200" y="161" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="300" fill="#7FC8FF">graph execution engine</text>
      </g>

      <g class="clickable" onclick="ask('What is the agent graph in LangGraph? What are nodes, edges, and state?')">
        <rect x="60" y="170" width="280" height="207" rx="8" fill="#0D1322" stroke="#2F4B68" stroke-width="0.6"/>
        <text x="200" y="188" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#F2FAFF">agent graph</text>
        <text x="200" y="203" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="300" fill="#99D3FF">your business logic</text>
      </g>

      <g class="clickable" onclick="ask('How does a LangGraph agent call an LLM? What happens inside a call_llm node?')">
        <rect x="72" y="218" width="76" height="30" rx="5" fill="#161F34" stroke="#40668D" stroke-width="0.6"/>
        <text x="110" y="233" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="400" fill="#F2FAFF">call llm</text>
      </g>

      <g class="clickable" onclick="ask('How does a LangGraph agent call a tool? What is a tool node and how does tool calling work?')">
        <rect x="161" y="218" width="76" height="30" rx="5" fill="#161F34" stroke="#40668D" stroke-width="0.6"/>
        <text x="199" y="233" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="400" fill="#F2FAFF">call tool</text>
      </g>

      <g class="clickable" onclick="ask('How does state get updated in a LangGraph agent? What are reducers and how does state flow through the graph?')">
        <rect x="250" y="218" width="82" height="30" rx="5" fill="#161F34" stroke="#40668D" stroke-width="0.6"/>
        <text x="291" y="233" text-anchor="middle" dominant-baseline="central" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="400" fill="#F2FAFF">update state</text>
      </g>

      <line x1="148" y1="233" x2="161" y2="233" stroke="#40668D" stroke-width="1.2" marker-end="url(#arr)"/>
      <line x1="237" y1="233" x2="250" y2="233" stroke="#40668D" stroke-width="1.2" marker-end="url(#arr)"/>

      <text x="200" y="267" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="300" fill="#40668D">edge routing · reducers · state</text>
      <text x="200" y="284" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="300" fill="#2F4B68">compiled once · reused per run</text>

      <g class="clickable" onclick="ask('What does Postgres store in LangGraph Deployment? What is the difference between the checkpointer and the store?')">
        <rect x="416" y="46" width="258" height="225" rx="14" fill="#0D1322" stroke="#7FC8FF" stroke-width="0.6"/>
        <text x="545" y="66" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#F2FAFF">postgres</text>
        <text x="545" y="81" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="300" fill="#7FC8FF">persistence · external</text>
      </g>

      <g class="clickable" onclick="ask('How does the LangGraph checkpointer work? What does it save and when does it save it?')">
        <rect x="427" y="98" width="236" height="54" rx="8" fill="#161F34" stroke="#006DDD" stroke-width="0.6"/>
        <text x="545" y="120" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#F2FAFF">checkpointer</text>
        <text x="545" y="136" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="300" fill="#99D3FF">graph state · per node</text>
      </g>

      <g class="clickable" onclick="ask('How does the LangGraph store work for long-term memory? How is it different from the checkpointer?')">
        <rect x="427" y="163" width="236" height="54" rx="8" fill="#161F34" stroke="#40668D" stroke-width="0.6"/>
        <text x="545" y="185" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#F2FAFF">store</text>
        <text x="545" y="201" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="300" fill="#99D3FF">long-term memory</text>
      </g>

      <g class="clickable" onclick="ask('What does Redis do in LangGraph Deployment? How does it handle the doorbell pattern and streaming?')">
        <rect x="416" y="293" width="258" height="68" rx="14" fill="#0D1322" stroke="#40668D" stroke-width="0.6"/>
        <text x="545" y="321" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="12" font-weight="500" fill="#F2FAFF">redis</text>
        <text x="545" y="337" text-anchor="middle" font-family="'IBM Plex Mono',monospace" font-size="10" font-weight="300" fill="#7FC8FF">doorbell · streaming</text>
      </g>

      <line x1="354" y1="152" x2="427" y2="125" stroke="#006DDD" stroke-width="1.2" marker-end="url(#arr)"/>
      <line x1="340" y1="190" x2="427" y2="190" stroke="#7FC8FF" stroke-width="1.2" marker-end="url(#arr)"/>
      <line x1="368" y1="327" x2="416" y2="327" stroke="#40668D" stroke-width="1.2" marker-end="url(#arr)"/>
    </svg>
  </div>

  <!-- Chat panel -->
  <div class="chat-panel">
    <div class="response-panel">
      <div class="response-header">
        <span class="response-title">agent response</span>
        <span class="status-dot" id="statusDot"></span>
      </div>
      <div class="question-label" id="questionLabel">click any box or type below to ask the tutor</div>
      <div class="response-body placeholder" id="responseBody">responses will appear here...</div>
      <div class="thread-info" id="threadInfo">
        no thread
        <button class="new-thread-btn" onclick="newThread()">new thread</button>
      </div>
    </div>

    <div class="input-row">
      <textarea class="chat-input" id="chatInput" placeholder="ask the tutor anything..." rows="1" onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendInput()">send</button>
    </div>
  </div>
</div>

<script>
  let threadId = null;
  let isStreaming = false;

  function newThread() {
    threadId = null;
    document.getElementById('threadInfo').innerHTML = 'no thread <button class="new-thread-btn" onclick="newThread()">new thread</button>';
    document.getElementById('responseBody').textContent = 'responses will appear here...';
    document.getElementById('responseBody').classList.add('placeholder');
    document.getElementById('questionLabel').textContent = 'click any box or type below to ask the tutor';
    document.getElementById('statusDot').className = 'status-dot';
  }

  function ask(question) {
    document.getElementById('chatInput').value = question;
    sendInput();
  }

  function handleKey(event) {
    if (event.key === 'Enter' && !event.shiftKey) {
      event.preventDefault();
      sendInput();
    }
  }

  async function sendInput() {
    if (isStreaming) return;
    const input = document.getElementById('chatInput');
    const message = input.value.trim();
    if (!message) return;

    const deploymentUrl = document.getElementById('deploymentUrl').value.trim().replace(/\/$/, '');
    const assistantId = document.getElementById('assistantId').value.trim() || 'tutor';

    if (!deploymentUrl) {
      document.getElementById('responseBody').innerHTML = '<span class="error-msg">please enter a deployment url above</span>';
      document.getElementById('responseBody').classList.remove('placeholder');
      return;
    }

    input.value = '';
    isStreaming = true;

    const dot = document.getElementById('statusDot');
    const body = document.getElementById('responseBody');
    const label = document.getElementById('questionLabel');
    const sendBtn = document.getElementById('sendBtn');

    label.textContent = message;
    body.textContent = '';
    body.classList.remove('placeholder');
    dot.className = 'status-dot active';
    sendBtn.disabled = true;

    try {
      // Send message to local server — it handles LangGraph connection and API key
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message,
          deployment_url: deploymentUrl,
          assistant_id: assistantId,
          session_key: 'default',
          new_thread: threadId === null,
        }),
      });

      if (!res.ok) {
        const errText = await res.text();
        throw new Error(`${res.status} ${res.statusText}: ${errText}`);
      }

      // Fetch thread id for display
      fetch('/thread?session_key=default')
        .then(r => r.json())
        .then(data => {
          if (data.thread_id) {
            threadId = data.thread_id;
            document.getElementById('threadInfo').innerHTML =
              `thread: ${threadId} <button class="new-thread-btn" onclick="newThread()">new thread</button>`;
          }
        });

      // Stream plain text chunks from server
      const reader = res.body.getReader();
      const decoder = new TextDecoder();

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        body.textContent += decoder.decode(value, { stream: true });
        body.scrollTop = body.scrollHeight;
      }

      dot.className = 'status-dot done';

    } catch (err) {
      body.innerHTML = `<span class="error-msg">${err.message}</span>`;
      dot.className = 'status-dot';
    } finally {
      isStreaming = false;
      sendBtn.disabled = false;
    }
  }
</script>
</body>
</html>
